<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gym">
<title>Gym App</title>
<link rel="stylesheet" href="style.css?v=3">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-title">Gym App</div>
    <div class="login-sub">Anmelden oder Registrieren</div>
    <input type="email" id="login-email" class="input" placeholder="deine@email.de" autocomplete="email">
    <input type="password" id="login-pw" class="input" placeholder="Passwort" autocomplete="current-password" style="margin-top:8px">
    <button class="btn primary block" id="login-btn" onclick="loginWithPassword()" style="margin-top:12px">Anmelden</button>
    <button class="btn block" onclick="signUp()" style="margin-top:8px">Neu registrieren</button>
    <button class="btn ghost" onclick="skipLogin()" style="margin-top:16px">Ohne Login weitermachen</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<!-- App (hidden until logged in) -->
<div id="app-main" class="app" style="display:none">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('session')">Session</button>
    <button class="tab-btn" onclick="showTab('history')">History</button>
    <button class="tab-btn" onclick="showTab('gym')">Gym</button>
    <button class="tab-btn" onclick="showTab('profile')">Profil</button>
  </div>

  <div class="view active" id="view-session"></div>
  <div class="view" id="view-history"></div>
  <div class="view" id="view-gym"></div>
  <div class="view" id="view-profile"></div>
</div>

<script src="app.js?v=9"></script>
</body>
</html>
