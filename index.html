<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gym">
<title>Gym App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;color:#111;background:#f7f7f7;min-height:100vh}
.app{max-width:520px;margin:0 auto;background:#f7f7f7;min-height:100vh;padding-bottom:80px}

/* Tab bar */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:14px 8px;font-size:14px;border:none;border-bottom:2px solid transparent;background:none;color:#999;cursor:pointer;font-weight:400;font-family:inherit}
.tab-btn.active{color:#111;border-bottom:2px solid #111;font-weight:500}

/* Views */
.view{display:none;padding:16px}
.view.active{display:block}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;font-size:14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#111;cursor:pointer;font-family:inherit;font-weight:400;min-height:48px;transition:opacity .15s}
.btn:active{opacity:.7}
.btn.primary{background:#111;color:#fff;border-color:#111;font-weight:500}
.btn.sm{padding:9px 14px;font-size:13px;min-height:40px;border-radius:8px}
.btn.block{width:100%;display:flex}

/* Session type buttons */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.type-btn{padding:14px 10px;font-size:14px;border-radius:10px;border:1px solid #e0e0e0;background:#fafafa;color:#555;cursor:pointer;font-family:inherit;min-height:50px;transition:all .15s}
.type-btn.selected{background:#111;color:#fff;border-color:#111}
.type-btn:active{opacity:.7}

/* Progress */
.progress-meta{display:flex;justify-content:space-between;font-size:13px;color:#999;margin-bottom:8px}
.progress-bar{height:3px;background:#eee;border-radius:2px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:#111;border-radius:2px;transition:width .3s}

/* Exercise cards */
.ex-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:opacity .2s}
.ex-card.current{border:1.5px solid #111}
.ex-card.done{opacity:.35}
.ex-row{display:flex;gap:12px;align-items:flex-start}
.ex-num{width:28px;height:28px;border-radius:50%;background:#f0f0f0;color:#888;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;margin-top:1px}
.ex-num.cur{background:#111;color:#fff}
.ex-name{font-size:15px;font-weight:500;margin-bottom:3px}
.ex-detail{font-size:14px;color:#555}
.ex-zone{font-size:12px;color:#bbb;margin-top:3px}
.ex-btns{display:flex;gap:8px;margin-top:14px}

/* Alternatives panel */
.alt-panel{background:#f6f6f6;border-radius:8px;overflow:hidden;margin-top:10px}
.alt-header{padding:8px 14px;font-size:12px;color:#999;border-bottom:1px solid #ebebeb}
.alt-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid #ebebeb}
.alt-row:last-child{border-bottom:none}
.alt-name{font-size:14px}
.alt-zone{font-size:12px;color:#bbb;margin-top:1px}

/* Done screen */
.done-screen{text-align:center;padding:60px 24px}
.done-icon{font-size:48px;margin-bottom:16px}
.done-title{font-size:22px;font-weight:500;margin-bottom:8px}
.done-sub{font-size:14px;color:#999;margin-bottom:28px}

/* Gym tab */
.section-label{font-size:11px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.device-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;border:1px solid #ebebeb;border-radius:10px;margin-bottom:6px}
.device-name{font-size:14px}
.device-sub{font-size:12px;color:#bbb;margin-top:2px}
.counter{display:flex;align-items:center;gap:10px}
.cnt-btn{width:34px;height:34px;border-radius:50%;border:1px solid #e0e0e0;background:#f5f5f5;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:#111;font-family:inherit;transition:opacity .15s}
.cnt-btn:active{opacity:.6}
.cnt-val{font-size:14px;font-weight:500;min-width:22px;text-align:center}
.del-btn{border:none;background:none;cursor:pointer;font-size:20px;color:#ccc;padding:4px;line-height:1}
.del-btn:active{color:#999}

/* Add device form */
.add-form{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin-top:8px;margin-bottom:16px}
.input{padding:11px 12px;font-size:14px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;font-family:inherit;width:100%;color:#111;outline:none}
.input:focus{border-color:#999}
.input-row{display:flex;gap:8px;margin-bottom:8px}

/* Photo upload */
.upload-area{display:block;border:1.5px dashed #ddd;border-radius:12px;padding:18px 16px;text-align:center;cursor:pointer;margin-bottom:16px;background:#fff;transition:background .15s}
.upload-area:active{background:#f5f5f5}
.upload-title{font-size:14px;font-weight:500;margin-bottom:4px}
.upload-sub{font-size:12px;color:#bbb}
.ai-result{font-size:13px;color:#555;padding:12px 14px;background:#f5f5f5;border-radius:8px;margin-bottom:16px;line-height:1.65;white-space:pre-wrap}

/* Profile */
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.profile-row:last-child{border-bottom:none}
.profile-label{color:#888}
.profile-val{font-weight:500}
.badge{font-size:11px;padding:4px 9px;border-radius:6px;background:#f0f0f0;color:#666}

/* Zone block */
.zone-block{margin-bottom:22px}

/* Sticky save bar */
.save-bar{position:sticky;bottom:0;padding:12px 0 0;background:linear-gradient(transparent,#f7f7f7 40%)}
</style>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('session')">Session</button>
    <button class="tab-btn" onclick="showTab('gym')">Gym</button>
    <button class="tab-btn" onclick="showTab('profile')">Profil</button>
  </div>

  <div class="view active" id="view-session"></div>
  <div class="view" id="view-gym"></div>
  <div class="view" id="view-profile"></div>
</div>

<script>
const WEIGHTS = {
  "Beinpresse":{w:125,unit:"kg",zone:"Kraftbereich EG"},
  "Latzug":{w:60,unit:"kg",zone:"Kraftbereich EG"},
  "Sitzrudern (Kabel)":{w:50,unit:"kg",zone:"Kabelzug"},
  "Bankdrücken":{w:50,unit:"kg",zone:"Kraftbereich EG"},
  "Schulterdrücken KH":{w:14,unit:"kg",zone:"Freihantel"},
  "Face Pulls":{w:20,unit:"kg",zone:"Kabelzug"},
  "Beinbeuger":{w:45,unit:"kg",zone:"Kraftbereich EG"},
  "Wadenheben exz.":{w:60,unit:"kg",zone:"Kraftbereich EG"},
  "Bulgarian Split Squat":{w:16,unit:"kg KH",zone:"Freihantel"},
  "Plank":{w:150,unit:"sek",zone:"Matten"}
};

const SESSIONS = {
  "Oberkörper":[
    {name:"Rudergerät Warm-up",sets:"5 min",w:"locker",zone:"Cardio EG",alts:[{name:"Crosstrainer Warm-up",zone:"Cardio EG"},{name:"Fahrrad Warm-up",zone:"Cardio EG"}]},
    {name:"Bankdrücken",sets:"4×10",w:"50 kg",zone:"Kraftbereich EG",alts:[{name:"KH Bankdrücken",zone:"Freihantel"},{name:"Butterfly / Pec Deck",zone:"Kraftbereich EG"},{name:"Kabelzug Flyes",zone:"Kabelzug"}]},
    {name:"Latzug",sets:"4×10",w:"60 kg",zone:"Kraftbereich EG",alts:[{name:"Latzug OG",zone:"Kraftbereich OG"},{name:"Klimmzug-Assist",zone:"Kraftbereich EG"},{name:"Kabel-Pulldown",zone:"Kabelzug"}]},
    {name:"Sitzrudern (Kabel)",sets:"4×10",w:"50 kg",zone:"Kabelzug",alts:[{name:"Rudermaschine",zone:"Kraftbereich EG"},{name:"Kabel-Rudern OG",zone:"Kraftbereich OG"}]},
    {name:"Schulterdrücken KH",sets:"3×12",w:"14 kg",zone:"Freihantel",alts:[{name:"Maschinen Schulterdrücken",zone:"Kraftbereich EG"},{name:"Arnold Press KH",zone:"Freihantel"}]},
    {name:"Face Pulls",sets:"3×15",w:"20 kg",zone:"Kabelzug",alts:[{name:"Reverse Fly Maschine",zone:"Kraftbereich EG"},{name:"Band Pull-Aparts",zone:"Matten"}]},
    {name:"Plank",sets:"3×max",w:"Ziel >2:30",zone:"Matten",alts:[{name:"Dead Bug",zone:"Matten"},{name:"Hollow Body Hold",zone:"Matten"}]},
    {name:"Rudergerät Cool-down",sets:"5 min",w:"locker",zone:"Cardio EG",alts:[{name:"Crosstrainer Cool-down",zone:"Cardio EG"},{name:"Stretching",zone:"Matten"}]}
  ],
  "Unterkörper":[
    {name:"Rudergerät Warm-up",sets:"5 min",w:"locker",zone:"Cardio EG",alts:[{name:"Fahrrad Warm-up",zone:"Cardio EG"},{name:"Crosstrainer",zone:"Cardio EG"}]},
    {name:"Beinpresse",sets:"4×10",w:"125 kg",zone:"Kraftbereich EG",alts:[{name:"Hack Squat Maschine",zone:"Kraftbereich EG"},{name:"Goblet Squat KH",zone:"Freihantel"}]},
    {name:"Bulgarian Split Squat",sets:"3×10",w:"16 kg KH",zone:"Freihantel",alts:[{name:"Ausfallschritte KH",zone:"Freihantel"},{name:"Einbeinige Beinpresse",zone:"Kraftbereich EG"}]},
    {name:"Beinbeuger",sets:"4×12",w:"45 kg",zone:"Kraftbereich EG",alts:[{name:"Nordic Curls",zone:"Matten"},{name:"Stiff Leg Deadlift KH",zone:"Freihantel"}]},
    {name:"Wadenheben exz.",sets:"4×15",w:"60 kg",zone:"Kraftbereich EG",alts:[{name:"Wadenheben einbeinig",zone:"Kraftbereich EG"},{name:"Donkey Calf Raise",zone:"Kraftbereich EG"}]},
    {name:"Plank",sets:"3×max",w:"Ziel >2:30",zone:"Matten",alts:[{name:"Glute Bridge",zone:"Matten"},{name:"Side Plank",zone:"Matten"}]},
    {name:"Rudergerät Cool-down",sets:"5 min",w:"locker",zone:"Cardio EG",alts:[{name:"Beine stretchen",zone:"Matten"},{name:"Schaumrolle",zone:"Matten"}]}
  ],
  "Vollkörper":[
    {name:"Rudergerät Warm-up",sets:"5 min",w:"locker",zone:"Cardio EG",alts:[{name:"Crosstrainer",zone:"Cardio EG"}]},
    {name:"Bankdrücken",sets:"3×10",w:"50 kg",zone:"Kraftbereich EG",alts:[{name:"KH Bankdrücken",zone:"Freihantel"}]},
    {name:"Beinpresse",sets:"3×10",w:"125 kg",zone:"Kraftbereich EG",alts:[{name:"Goblet Squat KH",zone:"Freihantel"}]},
    {name:"Latzug",sets:"3×10",w:"60 kg",zone:"Kraftbereich EG",alts:[{name:"Latzug OG",zone:"Kraftbereich OG"}]},
    {name:"Beinbeuger",sets:"3×12",w:"45 kg",zone:"Kraftbereich EG",alts:[{name:"Nordic Curls",zone:"Matten"}]},
    {name:"Plank",sets:"3×max",w:"Ziel >2:30",zone:"Matten",alts:[{name:"Dead Bug",zone:"Matten"}]},
    {name:"Rudergerät Cool-down",sets:"5 min",w:"locker",zone:"Cardio EG",alts:[{name:"Stretching",zone:"Matten"}]}
  ]
};

const GYM_DEFAULT = {
  "Cardio EG":[
    {name:"Concept2 Rudergerät",sub:"3 Stück",count:3},
    {name:"Laufband",sub:"Technogym Run",count:6},
    {name:"Crosstrainer",sub:"Technogym",count:4},
    {name:"Ergometer",sub:"Upright Bike",count:5}
  ],
  "Kraftbereich EG":[
    {name:"Beinpresse",sub:"45° Maschine",count:2},
    {name:"Beinbeuger liegend",sub:"Hamstring Curl",count:2},
    {name:"Wadenheben stehend",sub:"Standing Calf",count:1},
    {name:"Bankdrücken",sub:"Flachbank + Stange",count:3},
    {name:"Latzug",sub:"Kabelzug-Maschine",count:2},
    {name:"Butterfly / Pec Deck",sub:"Brust-Maschine",count:1},
    {name:"Klimmzug-Assist",sub:"Gewichteter Assist",count:1}
  ],
  "Kabelzug":[
    {name:"Kabelzug-Station EG",sub:"Dual Pulley",count:4},
    {name:"Functional Trainer",sub:"Crossover",count:2}
  ],
  "Kraftbereich OG":[
    {name:"Kabelzug-Station OG",sub:"Dual Pulley",count:2},
    {name:"Rudermaschine",sub:"Sitzrudern",count:2},
    {name:"Power Rack",sub:"Freihantel",count:2},
    {name:"Kurzhantelbereich",sub:"2–40 kg",count:1}
  ],
  "Matten":[
    {name:"Mattenbereich",sub:"Core / Stretching",count:1},
    {name:"Schaumrollen",sub:"Foam Roller",count:4},
    {name:"TRX",sub:"Sling Trainer",count:2}
  ]
};

const KEY = "gymapp_v1";
let gym = JSON.parse(localStorage.getItem(KEY) || "null") || JSON.parse(JSON.stringify(GYM_DEFAULT));
let currentTab = "session";
let sessionType = "Oberkörper";
let exercises = [];
let curIdx = 0;
let altOpen = -1;
let sessionActive = false;

function saveGym() { localStorage.setItem(KEY, JSON.stringify(gym)); }

function showTab(t) {
  currentTab = t;
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", ["session","gym","profile"][i] === t));
  document.querySelectorAll(".view").forEach((v,i) => v.classList.toggle("active", ["session","gym","profile"][i] === t));
  if(t==="session") renderSession();
  if(t==="gym") renderGym();
  if(t==="profile") renderProfile();
}

// ── SESSION ──────────────────────────────────────────────

function renderSession() {
  const el = document.getElementById("view-session");
  if (!sessionActive) {
    el.innerHTML = `
      <div style="font-size:15px;font-weight:500;margin-bottom:14px">Welche Session?</div>
      <div class="type-grid">
        ${["Oberkörper","Unterkörper","Vollkörper","Laufen"].map(t =>
          `<button class="type-btn${sessionType===t?" selected":""}" onclick="selectType('${t}')">${t}</button>`
        ).join("")}
      </div>
      <button class="btn primary block" onclick="startSession()" style="margin-top:4px">Starten</button>`;
  } else if (curIdx >= exercises.length) {
    el.innerHTML = `
      <div class="done-screen">
        <div class="done-icon">✓</div>
        <div class="done-title">Session done</div>
        <div class="done-sub">${exercises.length} Übungen · ${sessionType}</div>
        <button class="btn primary" onclick="resetSession()">Neue Session</button>
      </div>`;
  } else {
    const pct = Math.round(curIdx / exercises.length * 100);
    let html = `
      <div class="progress-meta"><span>${sessionType}</span><span>${curIdx}/${exercises.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

    exercises.forEach((ex, i) => {
      const isCur = i === curIdx, isDone = i < curIdx;
      html += `<div class="ex-card${isCur?" current":""}${isDone?" done":""}">
        <div class="ex-row">
          <div class="ex-num${isCur?" cur":""}">${isDone?"✓":i+1}</div>
          <div style="flex:1">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-detail">${ex.sets} · ${ex.w}</div>
            <div class="ex-zone">${ex.zone}</div>
          </div>
        </div>`;
      if (isCur) {
        html += `<div class="ex-btns">
          <button class="btn primary sm" onclick="doneEx()">Erledigt →</button>
          ${ex.alts&&ex.alts.length ? `<button class="btn sm" onclick="toggleAlts(${i})">${altOpen===i?"✕ Schließen":"Besetzt?"}</button>` : ""}
        </div>`;
        if (altOpen === i && ex.alts && ex.alts.length) {
          html += `<div class="alt-panel">
            <div class="alt-header">Alternative wählen:</div>
            ${ex.alts.map((alt,ai) => `
              <div class="alt-row">
                <div><div class="alt-name">${alt.name}</div><div class="alt-zone">${alt.zone}</div></div>
                <button class="btn primary sm" onclick="swapEx(${i},${ai})">Wählen</button>
              </div>`).join("")}
          </div>`;
        }
      }
      html += `</div>`;
    });
    el.innerHTML = html;
    if (curIdx < exercises.length) {
      document.querySelectorAll(".ex-card")[curIdx]?.scrollIntoView({behavior:"smooth",block:"nearest"});
    }
  }
}

function selectType(t) { sessionType = t; renderSession(); }

function startSession() {
  if (sessionType === "Laufen") {
    document.getElementById("view-session").innerHTML = `
      <div style="padding:32px 0;text-align:center">
        <div style="font-size:17px;font-weight:500;margin-bottom:16px">Laufen</div>
        <div style="font-size:14px;color:#666;line-height:2">
          Easy: 5:40–6:00 min/km<br>
          Steady: 5:00–5:30 min/km<br>
          Tempo: 4:30–4:45 min/km
        </div>
        <button class="btn sm" style="margin-top:24px" onclick="resetSession()">← Zurück</button>
      </div>`;
    return;
  }
  exercises = JSON.parse(JSON.stringify(SESSIONS[sessionType] || SESSIONS["Oberkörper"]));
  curIdx = 0; altOpen = -1; sessionActive = true;
  renderSession();
}

function doneEx() { altOpen = -1; curIdx++; renderSession(); }

function toggleAlts(i) { altOpen = altOpen === i ? -1 : i; renderSession(); }

function swapEx(i, ai) {
  const o = exercises[i], alt = o.alts[ai], wd = WEIGHTS[alt.name];
  exercises[i] = {
    name: alt.name, sets: o.sets,
    w: wd ? `${wd.w} ${wd.unit}` : o.w,
    zone: alt.zone,
    alts: [{name:o.name,zone:o.zone}, ...o.alts.filter((_,x)=>x!==ai)]
  };
  altOpen = -1; renderSession();
}

function resetSession() { sessionActive = false; curIdx = 0; renderSession(); }

// ── GYM ──────────────────────────────────────────────────

function renderGym() {
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:15px;font-weight:500">Fitness First Schwabing</span>
      <span class="badge">2.400 m²</span>
    </div>
    <label class="upload-area">
      <div class="upload-title">📷 Foto → KI erkennt Geräte</div>
      <div class="upload-sub">Gymbereich fotografieren, automatisch einloggen</div>
      <input type="file" accept="image/*" capture="environment" style="display:none" onchange="analyzePhoto(this)">
    </label>
    <div id="ai-output"></div>`;

  Object.entries(gym).forEach(([zone, devices]) => {
    html += `<div class="zone-block">
      <div class="section-label">${zone}</div>`;
    devices.forEach((d, di) => {
      html += `<div class="device-row">
        <div>
          <div class="device-name">${d.name}</div>
          ${d.sub ? `<div class="device-sub">${d.sub}</div>` : ""}
        </div>
        <div class="counter">
          <button class="cnt-btn" onclick="chgCount('${zone}',${di},-1)">−</button>
          <span class="cnt-val">${d.count}</span>
          <button class="cnt-btn" onclick="chgCount('${zone}',${di},1)">+</button>
          <button class="del-btn" onclick="delDevice('${zone}',${di})">×</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  const zones = Object.keys(gym);
  html += `
    <div class="section-label">Gerät hinzufügen</div>
    <div class="add-form">
      <div class="input-row">
        <input class="input" id="new-name" placeholder="Gerätename" style="flex:1">
        <input class="input" id="new-sub" placeholder="Typ / Marke" style="width:120px">
      </div>
      <div class="input-row">
        <select class="input" id="new-zone" style="flex:1">
          ${zones.map(z=>`<option value="${z}">${z}</option>`).join("")}
        </select>
        <button class="btn primary sm" onclick="addDevice()" style="flex-shrink:0">+ Add</button>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn primary block" id="save-btn" onclick="doSave()">Gym speichern</button>
    </div>`;

  document.getElementById("view-gym").innerHTML = html;
}

function chgCount(zone, idx, delta) {
  gym[zone][idx].count = Math.max(0, gym[zone][idx].count + delta);
  renderGym();
}

function delDevice(zone, idx) {
  gym[zone].splice(idx, 1);
  if (!gym[zone].length) delete gym[zone];
  renderGym();
}

function addDevice() {
  const name = document.getElementById("new-name").value.trim();
  const sub = document.getElementById("new-sub").value.trim();
  const zone = document.getElementById("new-zone").value;
  if (!name) return;
  if (!gym[zone]) gym[zone] = [];
  gym[zone].push({name, sub, count:1});
  renderGym();
}

function doSave() {
  saveGym();
  const btn = document.getElementById("save-btn");
  if (btn) { btn.textContent = "Gespeichert ✓"; setTimeout(()=>{ btn.textContent="Gym speichern"; }, 2000); }
}

async function analyzePhoto(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  const out = document.getElementById("ai-output");
  out.innerHTML = `<div class="ai-result">Analysiere Foto...</div>`;
  try {
    const b64 = await new Promise((res,rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 700,
        system: "Du analysierst Fotos von Fitnessstudios. Liste alle sichtbaren Geräte auf Deutsch auf. Format: Gerätename | Typ/Marke | Anzahl | Zone. Danach stelle 1-2 kurze Rückfragen wenn etwas unklar ist.",
        messages: [{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"Welche Geräte siehst du?"}]}]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b=>b.type==="text")?.text || "Keine Antwort erhalten.";
    out.innerHTML = `<div class="ai-result">${text.replace(/\n/g,"<br>")}</div>`;
  } catch(e) {
    out.innerHTML = `<div class="ai-result">Fehler beim Analysieren. Nochmal versuchen.</div>`;
  }
}
