<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gym">
<title>Gym App</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('session')">Session</button>
    <button class="tab-btn" onclick="showTab('history')">History</button>
    <button class="tab-btn" onclick="showTab('gym')">Gym</button>
    <button class="tab-btn" onclick="showTab('profile')">Profil</button>
  </div>

  <div class="view active" id="view-session"></div>
  <div class="view" id="view-history"></div>
  <div class="view" id="view-gym"></div>
  <div class="view" id="view-profile"></div>
</div>
<script src="app.js"></script>
</body>
</html>
